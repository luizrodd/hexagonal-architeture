version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: medical_clinic_db
    environment:
      POSTGRES_USER: clinic_user
      POSTGRES_PASSWORD: clinic_pass
      POSTGRES_DB: medical_clinic
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U clinic_user -d medical_clinic']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: medical_clinic_mq
    environment:
      RABBITMQ_DEFAULT_USER: clinic_user
      RABBITMQ_DEFAULT_PASS: clinic_pass
    ports:
      - '5672:5672'
      - '15672:15672'   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
